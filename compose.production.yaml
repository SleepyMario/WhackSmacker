x-app: &app
  image: ${WHACKSMACKER_IMAGE:-ghcr.io/sleepymario/whacksmacker:0.1.0-alpha.1}
  env_file:
    - ${WHACKSMACKER_ENV_FILE:-.env.production}
  volumes:
    - application-data:/data
    - reading-curricula:/curricula:ro
  networks:
    - internal
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  curricula:
    image: ${WHACKSMACKER_CURRICULA_IMAGE:-sleepiestmario/whacksmacker-curricula:local}
    restart: "no"
    volumes:
      - reading-curricula:/curricula
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-whacksmacker}
      POSTGRES_USER: ${POSTGRES_USER:-whacksmacker}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  migrate:
    <<: *app
    command: ["admin", "db", "migrate"]
    restart: "no"
    depends_on:
      curricula:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  app:
    <<: *app
    command: ["web", "--host", "0.0.0.0", "--port", "8787", "--data-dir", "/data", "--catalogue", "/curricula/managed/catalogue.json"]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${WHACKSMACKER_BIND_ADDRESS:-127.0.0.1}:8787:8787"
    networks:
      - internal
      - edge
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  application-data:
  reading-curricula:

networks:
  internal:
    internal: true
  edge:

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:-./secrets/postgres_password}
