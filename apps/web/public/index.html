<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhackSmacker Reader</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/app">WhackSmacker</a>
    <span id="username" class="username"></span>
    <button id="logout" type="button">Log out</button>
  </header>
  <main>
    <h1>Curriculum reader</h1>
    <div id="status" class="status" role="status" aria-live="polite">Loading your curricula…</div>
    <section id="controls" class="controls" aria-label="Reading choices" hidden>
      <label>Curriculum
        <select id="curriculum"></select>
      </label>
      <label>Exact version
        <select id="version"></select>
      </label>
      <fieldset>
        <legend>Source-content language</legend>
        <label><input type="radio" name="source-locale" value="en"> English</label>
        <label><input type="radio" name="source-locale" value="zh-TW"> 中文（臺灣）</label>
      </fieldset>
    </section>
    <aside id="overlay" class="overlay" aria-live="polite" hidden></aside>
    <div class="reader-layout">
      <nav id="chapters-panel" aria-label="Chapters" hidden>
        <h2>Chapters</h2>
        <ol id="chapters" class="chapters"></ol>
      </nav>
      <article id="reader" tabindex="-1" hidden>
        <header class="reader-header">
          <p id="chapter-position"></p>
          <h2 id="chapter-title"></h2>
        </header>
        <div id="chapter-content" class="chapter-content"></div>
        <nav class="chapter-navigation" aria-label="Chapter navigation">
          <button id="previous" type="button" aria-label="Previous chapter">Previous chapter</button>
          <button id="next" type="button" aria-label="Next chapter">Next chapter</button>
        </nav>
      </article>
    </div>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
