<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="light dark"><title>Log in — WhackSmacker</title><link rel="stylesheet" href="/landing.css"></head><body data-title-key="login.title"><header class="public-header"><a class="wordmark" href="/">WhackSmacker</a><label class="locale-control"><span data-i18n="landing.language">Language</span><select id="ui-locale" aria-label="Language" data-i18n-attr="aria-label:landing.language"><option value="en">English</option><option value="zh-TW">中文（臺灣）</option></select></label></header><main class="login"><a class="back" href="/" data-i18n="login.back">← Back to WhackSmacker</a><section class="login-card"><img src="/assets/whacksmacker-logo.png" alt="WhackSmacker"><p class="eyebrow" data-i18n="login.eyebrow">Private local study space</p><h1 data-i18n="login.heading">Log in</h1><p data-i18n="login.text">Enter your WhackSmacker username and password. There is no public registration or default account.</p><form id="login-form"><label for="username">Username</label><input id="username" name="username" type="text" autocomplete="username" required autofocus><label for="password" data-i18n="login.password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required><button class="button primary" type="submit" data-i18n="login.submit">Log in</button><p id="login-error" class="error" role="alert"></p></form></section></main><script src="/ui-locale.js"></script><script src="/login.js"></script></body></html>
